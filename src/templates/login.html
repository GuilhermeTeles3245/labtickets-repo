<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – LabTickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .login-logo { color: #1a73e8; font-size: 2.5rem; }
        .btn-login { background: #1a73e8; border: none; padding: .75rem; font-size: 1rem; border-radius: 8px; }
        .btn-login:hover { background: #1558b0; }
        .form-control { border-radius: 8px; padding: .65rem 1rem; }
        .hint-box { background: #f0f4ff; border-radius: 10px; padding: .75rem 1rem; font-size: .82rem; color: #555; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <i class="bi bi-ticket-perforated-fill login-logo"></i>
        <h2 class="fw-bold mt-2">LabTickets</h2>
        <p class="text-muted small">Sistema de Chamados de TI</p>
    </div>

    {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
    {% endfor %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-semibold">Usuário</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="seu.usuario" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="senha" class="form-control" placeholder="••••••" required>
            </div>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
            <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
        </button>
    </form>

    <div class="text-center mt-3">
        <span class="text-muted small">Não tem conta? </span>
        <a href="{{ url_for('cadastro') }}" class="text-primary fw-semibold small text-decoration-none">
            Criar conta de Solicitante
        </a>
    </div>


</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
