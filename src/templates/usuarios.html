{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-people me-2 text-primary"></i>Usuários</h4>
    <a href="{{ url_for('novo_usuario') }}" class="btn btn-primary btn-sm">
        <i class="bi bi-person-plus me-1"></i> Novo Usuário
    </a>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr>
                    <th class="ps-3">Nome</th>
                    <th>Usuário</th>
                    <th>Perfil</th>
                    <th>Status</th>
                    <th>Criado em</th>
                    <th class="text-end pe-3">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td class="ps-3 fw-semibold">{{ u.nome }}</td>
                    <td><code>{{ u.username }}</code></td>
                    <td>
                        <span class="badge
                            {% if u.perfil == 'coordenador' %}bg-danger
                            {% elif u.perfil == 'tecnico' %}bg-warning text-dark
                            {% else %}bg-info text-dark{% endif %}">
                            {{ u.perfil }}
                        </span>
                    </td>
                    <td>
                        <span class="badge {{ 'bg-success' if u.ativo else 'bg-secondary' }}">
                            {{ 'Ativo' if u.ativo else 'Inativo' }}
                        </span>
                    </td>
                    <td class="text-muted small">{{ u.criado_em.strftime('%d/%m/%Y') }}</td>
                    <td class="text-end pe-3">
                        <form method="POST" action="{{ url_for('toggle_usuario', id=u.id) }}" class="d-inline">
                            <button class="btn btn-sm {{ 'btn-outline-danger' if u.ativo else 'btn-outline-success' }}">
                                {% if u.ativo %}<i class="bi bi-person-x"></i> Desativar
                                {% else %}<i class="bi bi-person-check"></i> Ativar{% endif %}
                            </button>
                        </form>
                        <form method="POST" action="{{ url_for('deletar_usuario', id=u.id) }}" class="d-inline"
                              onsubmit="return confirm('Deletar permanentemente a conta de {{ u.nome }}? Esta acao nao pode ser desfeita.')">
                            <button class="btn btn-sm btn-danger ms-1" title="Deletar conta">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
